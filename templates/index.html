<!DOCTYPE html>
<html>
<head>
    <title>Realtime Weather & News Tracker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="text-center mb-4">
        <h1>Realtime Weather & News Tracker 🌦️📰</h1>
        <p class="text-muted">Flask Based Real-Time App</p>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-tabs" id="myTab" role="tablist">
        
        <li class="nav-item" role="presentation">
            <button class="nav-link {% if active_tab == 'weather' %}active{% endif %}"

                data-bs-toggle="tab"
                data-bs-target="#weather">
                🌦️ Weather
            </button>
        </li>

        <li class="nav-item" role="presentation">
            <button class="nav-link {% if active_tab == 'news' %}active{% endif %}"
                data-bs-toggle="tab"
                data-bs-target="#news">
                📰 News
            </button>
        </li>
        <li class="nav-item" role="presentation">
        <a class="nav-link {% if active_tab == 'history' %}active{% endif %}"
           href="/history">
           🕘 History
        </a>
    </li>

    </ul>

    <div class="tab-content mt-4">

        <!-- Weather Tab -->
        <div class="tab-pane fade {% if active_tab == 'weather' %}show active{% endif %}" id="weather">

            <div class="card p-4 shadow">
                <h4>Weather Section</h4>

                <form method="POST" action="/weather">
                    <div class="mb-3">
                        <label class="form-label">Enter City Name:</label>
                        <input type="text" name="city" class="form-control" placeholder="e.g. Delhi" required>
    </div>

    <button type="submit" class="btn btn-primary">Get Weather</button>
</form>
{% if weather_result %}
  <div class="alert alert-info mt-3">
    {{ weather_result | safe }}
  </div>
{% endif %}

                
            </div>
        </div>

        <!-- News Tab -->
         <!-- News Tab -->
<div class="tab-pane fade {% if active_tab == 'news' %}show active{% endif %}" id="news">
    <div class="card p-4 shadow">
        <h4>News Section</h4>

        <form method="POST" action="/news">
            <div class="mb-3">
                <label class="form-label">Enter Topic:</label>
                <input type="text" name="topic" class="form-control" placeholder="e.g. AI, Delhi, Jobs" required>
            </div>

            <button type="submit" class="btn btn-success">Get News</button>
        </form>

        {% if news_result %}
          <div class="alert alert-warning mt-3">
            {{ news_result | safe }}
          </div>
        {% endif %}

    </div>
</div>


    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
